<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Document Q&A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    header { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: 1.5rem; }
    .badge { margin-left: auto; background: #16a34a22; color: #4ade80; border: 1px solid #4ade8044; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    aside { width: 300px; background: #1e293b; border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    aside h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }

    .upload-area { border: 2px dashed #334155; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-area:hover { border-color: #6366f1; background: #6366f111; }
    .upload-area input { display: none; }
    .upload-area p { font-size: 0.85rem; color: #94a3b8; margin-top: 6px; }
    .upload-area .icon { font-size: 2rem; }

    #file-info { background: #0f172a; border-radius: 8px; padding: 10px 12px; font-size: 0.82rem; color: #94a3b8; display: none; }
    #file-info span { color: #e2e8f0; font-weight: 500; }

    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid #f8717144; font-size: 0.82rem; padding: 8px; }
    .btn-danger:hover { background: #f8717111; }

    .progress-wrap { display: none; }
    .progress-label { font-size: 0.78rem; color: #94a3b8; margin-bottom: 6px; }
    .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 3px; transition: width 0.4s ease; width: 0%; }

    .status-msg { font-size: 0.82rem; padding: 8px 12px; border-radius: 8px; display: none; }
    .status-msg.success { background: #16a34a22; color: #4ade80; border: 1px solid #4ade8033; }
    .status-msg.error { background: #dc262622; color: #f87171; border: 1px solid #f8717133; }

    .divider { border: none; border-top: 1px solid #334155; }

    .doc-list { display: flex; flex-direction: column; gap: 6px; }
    .doc-item { background: #0f172a; border-radius: 6px; padding: 8px 10px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
    .doc-item .dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; flex-shrink: 0; }

    /* ── Chat ── */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 12px; max-width: 800px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .msg.user .msg-avatar { background: #6366f1; }
    .msg.bot .msg-avatar { background: #1e293b; border: 1px solid #334155; }
    .msg-bubble { background: #1e293b; border-radius: 12px; padding: 12px 16px; font-size: 0.9rem; line-height: 1.6; border: 1px solid #334155; max-width: 660px; }
    .msg.user .msg-bubble { background: #6366f1; border-color: #6366f1; }
    .msg-source { font-size: 0.75rem; color: #64748b; margin-top: 6px; }

    .typing { display: flex; gap: 5px; padding: 14px 16px; }
    .typing span { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #475569; gap: 12px; }
    .empty-state .big-icon { font-size: 3rem; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Input ── */
    .chat-input-area { padding: 16px 24px; border-top: 1px solid #334155; background: #0f172a; display: flex; gap: 10px; }
    #question-input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; outline: none; resize: none; font-family: inherit; }
    #question-input:focus { border-color: #6366f1; }
    #question-input::placeholder { color: #475569; }
    #send-btn { background: #6366f1; border: none; color: white; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; transition: background 0.2s; }
    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span>📄</span>
  <h1>RAG Document Q&A</h1>
  <div class="badge">🟢 Llama 3 · Groq</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <h2>Upload Document</h2>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="icon">📂</div>
      <strong>Click to choose file</strong>
      <p>PDF, DOCX, or TXT</p>
      <input type="file" id="file-input" accept=".pdf,.docx,.txt" onchange="onFileSelected(this)" />
    </div>

    <div id="file-info"></div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label" id="progress-label">Processing…</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="status-msg" id="status-msg"></div>

    <button class="btn btn-primary" id="ingest-btn" onclick="ingestDocument()" disabled>
      ⚡ Ingest Document
    </button>

    <hr class="divider" />

    <h2>Indexed Documents</h2>
    <div class="doc-list" id="doc-list">
      <div style="font-size:0.8rem;color:#475569;">No documents yet.</div>
    </div>

    <hr class="divider" />

    <button class="btn btn-danger" onclick="clearDocs()">🗑️ Clear All Documents</button>
  </aside>

  <!-- Chat area -->
  <main>
    <div id="chat-messages">
      <div class="empty-state" id="empty-state">
        <div class="big-icon">💬</div>
        <p>Upload a document and start asking questions</p>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="question-input" rows="1" placeholder="Ask something about your document…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuestion()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button id="send-btn" onclick="sendQuestion()">➤</button>
    </div>
  </main>
</div>

<script>
  let selectedFile = null;
  const ingestedDocs = [];

  function onFileSelected(input) {
    selectedFile = input.files[0];
    if (!selectedFile) return;
    const mb = (selectedFile.size / 1024 / 1024).toFixed(1);
    const info = document.getElementById('file-info');
    info.style.display = 'block';
    info.innerHTML = `📎 <span>${selectedFile.name}</span> &nbsp;(${mb} MB)`;
    document.getElementById('ingest-btn').disabled = false;
    hideStatus();
  }

  async function ingestDocument() {
    if (!selectedFile) return;
    const btn = document.getElementById('ingest-btn');
    btn.disabled = true;

    showProgress(10, 'Reading document…');
    const formData = new FormData();
    formData.append('file', selectedFile);

    showProgress(40, 'Splitting into chunks…');
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      showProgress(80, 'Storing embeddings…');
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || 'Upload failed');

      showProgress(100, 'Done!');
      setTimeout(() => hideProgress(), 600);
      showStatus('success', `✅ ${data.message} &nbsp;·&nbsp; ${data.chunks} chunks indexed`);

      if (!ingestedDocs.includes(selectedFile.name)) {
        ingestedDocs.push(selectedFile.name);
        renderDocList();
      }
      document.getElementById('empty-state')?.remove();
    } catch (err) {
      hideProgress();
      showStatus('error', `❌ ${err.message}`);
    }
    btn.disabled = false;
  }

  async function sendQuestion() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('empty-state')?.remove();

    appendMessage('user', question);
    const typing = appendTyping();

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      typing.remove();
      if (!res.ok) throw new Error(data.detail || 'Error');
      appendMessage('bot', data.answer, data.sources);
    } catch (err) {
      typing.remove();
      appendMessage('bot', `❌ ${err.message}`);
    }
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  async function clearDocs() {
    if (!confirm('Clear all indexed documents?')) return;
    await fetch('/clear', { method: 'DELETE' });
    ingestedDocs.length = 0;
    renderDocList();
    showStatus('success', '✅ Vector store cleared');
    document.getElementById('file-info').style.display = 'none';
    selectedFile = null;
    document.getElementById('ingest-btn').disabled = true;
  }

  // ── UI helpers ──────────────────────────────────────────────
  function appendMessage(role, text, sources) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? '🧑' : '🤖';
    const sourcesHtml = sources?.length
      ? `<div class="msg-source">📚 Source: ${sources.join(', ')}</div>` : '';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div><div class="msg-bubble">${escHtml(text)}</div>${sourcesHtml}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function appendTyping() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="msg-avatar">🤖</div>
      <div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function showProgress(pct, label) {
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('progress-label').textContent = label;
    document.getElementById('progress-fill').style.width = pct + '%';
  }
  function hideProgress() {
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
  }
  function showStatus(type, msg) {
    const el = document.getElementById('status-msg');
    el.className = `status-msg ${type}`;
    el.innerHTML = msg;
    el.style.display = 'block';
  }
  function hideStatus() { document.getElementById('status-msg').style.display = 'none'; }

  function renderDocList() {
    const list = document.getElementById('doc-list');
    if (!ingestedDocs.length) {
      list.innerHTML = '<div style="font-size:0.8rem;color:#475569;">No documents yet.</div>';
    } else {
      list.innerHTML = ingestedDocs.map(d =>
        `<div class="doc-item"><div class="dot"></div>${escHtml(d)}</div>`).join('');
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
